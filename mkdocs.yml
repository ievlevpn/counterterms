site_name: counterterms
site_description: Symbolic renormalized equations for singular SPDEs (Bailleul–Hoshino tourist guide)
site_author: Pavel Ievlev
site_url: https://ievlevpn.github.io/counterterms/
repo_url: https://github.com/ievlevpn/counterterms
repo_name: ievlevpn/counterterms

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - The mathematics: mathematics.md
  - Conventions: conventions.md
  - User guide:
      - Writing an SPDE: guide/writing-spdes.md
      - Reports & output: guide/reports.md
      - The da Prato–Debussche lift: guide/daprato.md
      - The algebraic layer: guide/algebra.md
  - Scope & limitations: scope.md
  - Validation: validation.md
  - API reference: api.md

validation:
  anchors: warn
